<!DOCTYPE html>
<html lang="{% if page.redirect_home or page.url contains 'PRIVACY_POLICY.zh-HK.html' %}zh-HK{% elsif page.url contains 'PRIVACY_POLICY.zh-CN.html' %}zh-CN{% elsif page.url contains 'PRIVACY_POLICY.en.html' %}en{% else %}en{% endif %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.redirect_home %}
  <meta http-equiv="refresh" content="0; url={{ site.baseurl }}/PRIVACY_POLICY.zh-HK.html">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}/PRIVACY_POLICY.zh-HK.html">
  {% endif %}
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --text: #1a1a1a;
      --muted: #555;
      --border: #ccc;
      --accent: #1a1a1a;
    }
    * { box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      color: var(--text);
      /* Same stack for all languages so TC/EN/SC don’t switch metrics */
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "PingFang HK", "PingFang TC", "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
      font-size: 1rem;
    }
    .top {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
      gap: 0.35rem;
      padding: 0.75rem clamp(0.75rem, 2.5vw, 1.5rem);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .top a {
      color: var(--text);
      text-decoration: none;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .top a:hover {
      background: #f2f2f2;
    }
    .top a[aria-current="page"] {
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }
    .sep {
      color: var(--muted);
      user-select: none;
      font-size: 0.85rem;
    }
    main {
      max-width: min(100%, 68rem);
      margin: 0;
      padding: 1rem clamp(0.75rem, 2.5vw, 1.5rem) 2.5rem;
    }
    .policy-content h1 {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 0 0 1rem;
    }
    .policy-content h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 1.75rem 0 0.65rem;
    }
    .policy-content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1.35rem 0 0.5rem;
    }
    .policy-content p, .policy-content li {
      margin: 0.65rem 0;
    }
    .policy-content ul, .policy-content ol {
      margin: 0.65rem 0;
      padding-left: 1.35rem;
    }
    .policy-content blockquote {
      margin: 1rem 0;
      padding: 0.5rem 0 0.5rem 1rem;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    .policy-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .policy-content a {
      color: var(--accent);
    }
    .policy-content strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="top" role="navigation" aria-label="Language">
    <a
      href="{{ site.baseurl }}/PRIVACY_POLICY.zh-HK.html"
      {% if page.url contains 'PRIVACY_POLICY.zh-HK.html' %}aria-current="page"{% endif %}
    >繁體</a>
    <span class="sep" aria-hidden="true">|</span>
    <a
      href="{{ site.baseurl }}/PRIVACY_POLICY.zh-CN.html"
      {% if page.url contains 'PRIVACY_POLICY.zh-CN.html' %}aria-current="page"{% endif %}
    >简体</a>
    <span class="sep" aria-hidden="true">|</span>
    <a
      href="{{ site.baseurl }}/PRIVACY_POLICY.en.html"
      {% if page.url contains 'PRIVACY_POLICY.en.html' %}aria-current="page"{% endif %}
    >English</a>
  </header>
  <main class="policy-content">
    {{ content }}
  </main>
</body>
</html>
